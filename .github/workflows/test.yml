name: Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: 'stable'
    - name: Vet
      run: go vet ./...
    - name: Test
      run: go test ./...
    - name: Fuzz smoke test
      if: runner.os != 'Windows'
      run: |
        go test -run=xxx -fuzz=FuzzRoundTrip -fuzztime=20s .
        go test -run=xxx -fuzz=FuzzDecompressFrame -fuzztime=20s .
        go test -run=xxx -fuzz=FuzzDecodeBlock -fuzztime=20s .

  cross-validate:
    name: Cross-validate against C bzip3
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: 'stable'
    - name: Build and install C bzip3 1.5.3
      # The byte-identity tests target C bzip3 1.5.3 specifically; distro
      # packages ship other versions whose encoder output differs. Build
      # the exact release (checksum-pinned; its tarball includes a
      # pre-generated configure, so only gcc/make are needed).
      run: |
        curl -fsSL -o /tmp/bzip3.tar.gz \
          https://github.com/iczelia/bzip3/releases/download/1.5.3/bzip3-1.5.3.tar.gz
        echo "c48823353084df2a5a0dba44fd5295abd078e40b49f09700d08af4d9b1e31d67  /tmp/bzip3.tar.gz" | sha256sum -c -
        tar xzf /tmp/bzip3.tar.gz -C /tmp
        cd /tmp/bzip3-1.5.3
        ./configure
        make
        sudo make install
        sudo ldconfig
        bzip3 -V
    - name: Cross-validation tests
      run: go test -v -run 'TestCross|TestByteIdentical' .
