name: Test

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: 'stable'
    - name: Vet
      run: go vet ./...
    - name: Test
      run: go test ./...
    - name: Fuzz smoke test
      if: runner.os != 'Windows'
      run: |
        go test -run=xxx -fuzz=FuzzRoundTrip -fuzztime=20s .
        go test -run=xxx -fuzz=FuzzDecompressFrame -fuzztime=20s .
        go test -run=xxx -fuzz=FuzzDecodeBlock -fuzztime=20s .

  cross-validate:
    name: Cross-validate against C bzip3
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: 'stable'
    - name: Install C bzip3
      run: sudo apt-get update && sudo apt-get install -y bzip3
    - name: Cross-validation tests
      run: go test -v -run 'TestCross|TestByteIdentical' .
